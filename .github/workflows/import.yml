name: Import ASG Blogs

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  import:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm install

      - run: node import.js
        env:
          SHOPIFY_TOKEN: ${{ secrets.SHOPIFY_TOKEN }}